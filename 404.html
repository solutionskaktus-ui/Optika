<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5B0070">
<title>Stranica nije pronađena — Optika Visage</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/x-icon" href="/favicons/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Rethink+Sans:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<style>
  .err-wrap { min-height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 4rem 1.5rem; }
  .err-content { max-width: 560px; }
  .err-code {
    font-family: var(--font-display); font-size: clamp(6rem, 18vw, 12rem); line-height: 1;
    font-weight: 800; letter-spacing: -0.05em;
    background: linear-gradient(135deg, var(--primary) 0%, var(--accent-warm) 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .err-title { font-family: var(--font-display); font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 700; margin-top: 1rem; margin-bottom: 1rem; line-height: 1.15; }
  .err-lede { color: var(--ink-soft); margin-bottom: 2rem; font-size: 1.1rem; }
  .err-actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>
<header class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <img src="/images/visage-logo-mark.png" alt="Visage Optika logo" width="34" height="20">
      <span class="logo-wordmark"><strong>VISAGE</strong>OPTIKA</span>
    </a>
  </div>
</header>
<main class="err-wrap">
  <div class="err-content">
    <div class="err-code">404</div>
    <h1 class="err-title">Stranica koju tražite ne postoji.</h1>
    <p class="err-lede">Moguće je da je premeštena ili da je link pogrešan. Vratite se na početnu ili nas pozovite.</p>
    <div class="err-actions">
      <a href="/" class="btn btn-primary">Početna</a>
      <a href="tel:+381603175264" class="btn btn-glass">060 3175264</a>
    </div>
  </div>
</main>
</body>
</html>
